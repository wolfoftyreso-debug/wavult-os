<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280">

  <!-- VÄNSTER CRESCENT: solid halvmåne, öppnar mot höger -->
  <!-- Yttre båge vänster, inre båge höger = crescent-form -->
  <path d="
    M 100,30
    A 110,110 0 1 0 100,250
    A 65,65 0 1 1 100,30
    Z
  " fill="#E8B84B"/>

  <!-- HÖGER CRESCENT: spegelvänd, öppnar mot vänster -->
  <path d="
    M 260,30
    A 110,110 0 1 1 260,250
    A 65,65 0 1 0 260,30
    Z
  " fill="#E8B84B"/>

  <!-- MITTEN: tunn horisontell bar -->
  <rect x="148" y="28" width="64" height="13" rx="2" fill="#E8B84B"/>

  <!-- MITTEN: inverterad triangel från bar ned till lång spets -->
  <polygon points="148,41 212,41 184,230 176,230" fill="#E8B84B"/>

  <!-- SPETS: förlängning -->
  <polygon points="176,220 184,220 180,260" fill="#E8B84B"/>

</svg>
