<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0A0A0F"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-width="0.3" opacity="0.02"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-width="0.3" opacity="0.02"/>
  <!-- Logo mark — pixel P -->
  <rect x="80" y="160" width="44" height="44" rx="6" fill="#6366F1"/>
  <rect x="80" y="212" width="44" height="144" rx="6" fill="#6366F1"/>
  <rect x="132" y="160" width="72" height="44" rx="6" fill="#6366F1"/>
  <rect x="132" y="212" width="72" height="44" rx="6" fill="#818CF8"/>
  <!-- Pixel fragment breaking free -->
  <rect x="218" y="144" width="18" height="18" rx="3" fill="#818CF8" opacity="0.6"/>
  <!-- Live signal dot -->
  <circle cx="212" cy="358" r="8" fill="#34C759"/>
  <circle cx="212" cy="358" r="16" fill="#34C759" opacity="0.15"/>
  <!-- Wordmark -->
  <text x="248" y="230" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif" font-size="80" font-weight="700" fill="#FFFFFF" letter-spacing="-4">pixdrift</text>
  <!-- Tagline -->
  <text x="250" y="290" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif" font-size="26" fill="#8E8E93" letter-spacing="-0.5">Your Business, Running.</text>
  <!-- Feature tags -->
  <text x="250" y="380" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" fill="#6366F1" letter-spacing="0.5">ISO 9001  ·  Swedac  ·  GDPR  ·  API-first  ·  €299/month</text>
  <!-- Separator line -->
  <rect x="250" y="330" width="480" height="1" fill="rgba(255,255,255,0.08)"/>
  <!-- Right side — geometric workflow shapes -->
  <rect x="820" y="80" width="260" height="4" rx="2" fill="#6366F1" opacity="0.5"/>
  <rect x="870" y="104" width="180" height="4" rx="2" fill="#6366F1" opacity="0.35"/>
  <rect x="840" y="128" width="220" height="4" rx="2" fill="#6366F1" opacity="0.25"/>
  <!-- Workflow cards -->
  <rect x="820" y="180" width="110" height="70" rx="10" fill="#16161F" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <rect x="820" y="196" width="60" height="8" rx="4" fill="#818CF8" opacity="0.6"/>
  <rect x="820" y="212" width="90" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="820" y="226" width="70" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="820" y="240" width="30" height="4" rx="2" fill="#34C759" opacity="0.7"/>

  <rect x="950" y="160" width="120" height="80" rx="10" fill="#16161F" stroke="rgba(99,102,241,0.3)" stroke-width="0.5"/>
  <rect x="950" y="176" width="70" height="8" rx="4" fill="#6366F1" opacity="0.8"/>
  <rect x="950" y="192" width="100" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="950" y="206" width="80" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="950" y="220" width="50" height="8" rx="4" fill="rgba(52,199,89,0.2)"/>
  <text x="955" y="228" font-family="sans-serif" font-size="8" fill="#34C759">✓ KLAR</text>

  <rect x="840" y="280" width="200" height="60" rx="10" fill="#16161F" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <rect x="840" y="296" width="80" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="840" y="310" width="160" height="4" rx="2" fill="rgba(99,102,241,0.3)"/>
  <rect x="840" y="322" width="100" height="4" rx="2" fill="rgba(99,102,241,0.15)"/>

  <rect x="860" y="370" width="240" height="4" rx="2" fill="#6366F1" opacity="0.15"/>
  <rect x="880" y="390" width="160" height="4" rx="2" fill="#6366F1" opacity="0.1"/>
  <!-- Live dot top right -->
  <circle cx="1150" cy="60" r="10" fill="#34C759"/>
  <circle cx="1150" cy="60" r="20" fill="#34C759" opacity="0.15"/>
  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" rx="0" fill="#6366F1" opacity="0.8"/>
  <!-- Gradient fade on right edge -->
  <defs>
    <linearGradient id="fadeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect x="800" y="0" width="400" height="630" fill="url(#fadeRight)"/>
</svg>
