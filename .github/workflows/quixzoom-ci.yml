name: QuixZoom CI/CD

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'apps/quixoom/**'
      - 'packages/quixoom-sdk/**'
      - 'packages/rules/**'
      - 'sql/4*.sql'
  pull_request:
    branches: [main]
    paths:
      - 'apps/quixoom/**'
      - 'packages/quixoom-sdk/**'
      - 'packages/rules/**'
      - 'sql/4*.sql'

env:
  NODE_VERSION: '22'
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: quixzoom
  EKS_CLUSTER: quixzoom-prod

jobs:
  # ============================================================================
  # 1. BUILD & TEST
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript compile check
        run: cd apps/quixoom && npx tsc --noEmit
        continue-on-error: false

      - name: Build QuixZoom
        run: cd apps/quixoom && npm run build

      - name: Build SDK
        run: cd packages/quixoom-sdk && npm run build

      - name: Run unit tests
        run: npx vitest run --reporter=verbose
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quixzoom-build
          path: apps/quixoom/dist/
          retention-days: 7

  # ============================================================================
  # 2. SECURITY SCAN
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "AKIA\|sk_live\|sk_test\|-----BEGIN.*KEY" apps/quixoom/src/ packages/quixoom-sdk/src/ 2>/dev/null; then
            echo "::error::Potential secrets found in source code!"
            exit 1
          fi
          echo "No secrets found."

      - name: SQL injection pattern check
        run: |
          echo "Scanning for potential SQL injection..."
          if grep -rn "query(\`" apps/quixoom/src/ 2>/dev/null | grep -v "test"; then
            echo "::warning::Template literal SQL detected — verify parameterized queries"
          fi
          echo "SQL scan complete."

      - name: Validate SQL migrations
        run: |
          echo "Validating SQL migration files..."
          for f in sql/4*.sql; do
            echo "Checking $f..."
            if ! head -1 "$f" | grep -q "^--"; then
              echo "::warning::$f missing header comment"
            fi
            if ! grep -q "BEGIN" "$f"; then
              echo "::warning::$f missing BEGIN transaction"
            fi
            if ! grep -q "COMMIT" "$f"; then
              echo "::warning::$f missing COMMIT"
            fi
          done
          echo "SQL validation complete."

  # ============================================================================
  # 3. DATABASE MIGRATION CHECK
  # ============================================================================
  db-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quixzoom
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: quixzoom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations in order
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: quixzoom
          PGPASSWORD: test_password
          PGDATABASE: quixzoom_test
        run: |
          echo "Running QuixZoom migrations..."
          for f in sql/40_quixoom_core.sql sql/41_quixzoom_users.sql sql/42_quixzoom_tasks.sql sql/43_quixzoom_ir.sql sql/44_quixzoom_cis.sql sql/45_quixzoom_workflows.sql; do
            echo "→ $f"
            psql -f "$f" || exit 1
          done
          echo "All migrations passed."

      - name: Verify table creation
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: quixzoom
          PGPASSWORD: test_password
          PGDATABASE: quixzoom_test
        run: |
          echo "Verifying tables..."
          TABLES=$(psql -t -c "SELECT count(*) FROM information_schema.tables WHERE table_name LIKE 'qx_%' OR table_name LIKE 'qz_%'")
          echo "QuixZoom tables created: $TABLES"
          if [ "$TABLES" -lt 30 ]; then
            echo "::error::Expected 30+ tables, got $TABLES"
            exit 1
          fi

      - name: Verify immutability triggers
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: quixzoom
          PGPASSWORD: test_password
          PGDATABASE: quixzoom_test
        run: |
          echo "Verifying immutability triggers..."
          TRIGGERS=$(psql -t -c "SELECT count(*) FROM information_schema.triggers WHERE trigger_name LIKE 'trg_qx_%' OR trigger_name LIKE 'trg_qz_%'")
          echo "Immutability triggers: $TRIGGERS"

      - name: Run migration idempotency test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: quixzoom
          PGPASSWORD: test_password
          PGDATABASE: quixzoom_test
        run: |
          echo "Running migrations again (idempotency test)..."
          for f in sql/40_quixoom_core.sql sql/41_quixzoom_users.sql sql/42_quixzoom_tasks.sql sql/43_quixzoom_ir.sql sql/44_quixzoom_cis.sql sql/45_quixzoom_workflows.sql; do
            psql -f "$f" || exit 1
          done
          echo "Idempotency test passed."

  # ============================================================================
  # 4. DOCKER BUILD
  # ============================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: quixzoom-build
          path: apps/quixoom/dist/

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} \
            -f apps/quixoom/Dockerfile \
            --build-arg NODE_ENV=production \
            .

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} $ECR_REPOSITORY:latest

  # ============================================================================
  # 5. DEPLOY TO EKS (production)
  # ============================================================================
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [docker, db-check]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          docker tag $ECR_REPOSITORY:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Run database migrations
        run: |
          kubectl run migrations-${{ github.sha }} \
            --image=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }} \
            --restart=Never \
            --env="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --command -- sh -c "
              for f in sql/4*.sql; do psql \$DATABASE_URL -f \$f; done
            "
          kubectl wait --for=condition=complete job/migrations-${{ github.sha }} --timeout=120s

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/quixzoom \
            quixzoom=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          kubectl rollout status deployment/quixzoom --timeout=300s

      - name: Health check
        run: |
          ENDPOINT=$(kubectl get svc quixzoom -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ENDPOINT/api/qx/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          echo "::error::Health check failed"
          exit 1
