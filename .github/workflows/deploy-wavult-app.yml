name: Deploy Wavult App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/wavult-app/**'
      - '.github/workflows/deploy-wavult-app.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --legacy-peer-deps

      - name: Build wavult-app
        run: npx vite build --base /hypbit/
        working-directory: apps/wavult-app

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html
        working-directory: apps/wavult-app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/wavult-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
