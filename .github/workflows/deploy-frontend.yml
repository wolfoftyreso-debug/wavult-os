name: Deploy Frontends

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'turbo.json'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1

jobs:
  build-and-deploy:
    name: Build & Deploy Frontends
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build all frontends
        run: cd apps/command-center && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Configure landing bucket
        continue-on-error: true
        run: |
          aws s3 website s3://pixdrift-landing-prod --index-document index.html --error-document index.html
          aws s3api put-public-access-block --bucket pixdrift-landing-prod \
            --public-access-block-configuration BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false || true
          aws s3api put-bucket-policy --bucket pixdrift-landing-prod --policy '{"Version":"2012-10-17","Statement":[{"Sid":"PublicRead","Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::pixdrift-landing-prod/*"}]}' || true

      - name: Deploy landing
        continue-on-error: true
        run: |
          echo "Files in apps/landing/:"
          ls apps/landing/*.html | head -5
          echo "Syncing to S3..."
          aws s3 sync apps/landing/ s3://pixdrift-landing-prod/ \
            --region ${{ env.AWS_REGION }} \
            --exclude "*.tsx" --exclude "*.ts" \
            --exclude "node_modules/*" --exclude "package*.json" \
            --exclude "tsconfig.json" --exclude "vite.config.*" \
            --cache-control "public,max-age=3600" \
            --debug 2>&1 | tail -30

      - name: Deploy workstation
        continue-on-error: true
        run: |
          if [ -d "apps/workstation/dist" ]; then
            echo "Deploying workstation ($(ls apps/workstation/dist/ | wc -l) items)..."
            aws s3 sync apps/workstation/dist/ s3://pixdrift-bc-workstation-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/workstation/dist/index.html s3://pixdrift-bc-workstation-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache"
            echo "Workstation deployed"
          else
            echo "No workstation dist/"
          fi

      - name: Deploy admin
        continue-on-error: true
        run: |
          if [ -d "apps/admin/dist" ]; then
            aws s3 sync apps/admin/dist/ s3://pixdrift-bc-admin-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/admin/dist/index.html s3://pixdrift-bc-admin-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache"
            echo "Admin deployed"
          else
            echo "No admin dist/"
          fi

      - name: Deploy CRM
        continue-on-error: true
        run: |
          if [ -d "apps/crm/dist" ]; then
            aws s3 sync apps/crm/dist/ s3://pixdrift-bc-crm-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/crm/dist/index.html s3://pixdrift-bc-crm-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache"
            echo "CRM deployed"
          else
            echo "No crm dist/"
          fi

      - name: Deploy sales
        continue-on-error: true
        run: |
          if [ -d "apps/sales/dist" ]; then
            aws s3 sync apps/sales/dist/ s3://pixdrift-bc-sales-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/sales/dist/index.html s3://pixdrift-bc-sales-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache"
            echo "Sales deployed"
          else
            echo "No sales dist/"
          fi

      - name: Summary
        if: always()
        run: |
          echo "=== Frontend Deploy Summary ==="
          for BUCKET in pixdrift-landing-prod pixdrift-bc-workstation-prod pixdrift-bc-admin-prod pixdrift-bc-crm-prod pixdrift-bc-sales-prod; do
            COUNT=$(aws s3 ls "s3://$BUCKET/" --recursive 2>/dev/null | wc -l)
            URL="http://$BUCKET.s3-website.eu-north-1.amazonaws.com"
            echo "$BUCKET: $COUNT files — $URL"
          done
