name: Deploy Frontends

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'turbo.json'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1

jobs:
  build-and-deploy:
    name: Build & Deploy Frontends
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build all frontends
        run: npx turbo build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure S3 buckets exist
        run: |
          set +e
          for BUCKET in pixdrift-landing-prod pixdrift-bc-workstation-prod pixdrift-bc-admin-prod pixdrift-bc-crm-prod pixdrift-bc-sales-prod; do
            echo "Checking $BUCKET..."
            aws s3api head-bucket --bucket "$BUCKET" 2>&1
            if [ $? -ne 0 ]; then
              echo "Creating $BUCKET..."
              aws s3 mb "s3://$BUCKET" --region eu-north-1 2>&1
            fi
          done
          set -e
          echo "S3 check complete"

      - name: Deploy landing
        run: |
          if [ -f "apps/landing/index.html" ]; then
            aws s3 sync apps/landing/ s3://pixdrift-landing-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --exclude "*.tsx" --exclude "*.ts" \
              --exclude "node_modules/*" --exclude "package*.json" \
              --exclude "tsconfig.json" --exclude "vite.config.*" \
              --cache-control "public,max-age=3600" 2>&1
          else
            echo "No landing index.html found"
          fi

      - name: Deploy workstation
        run: |
          if [ -d "apps/workstation/dist" ]; then
            aws s3 sync apps/workstation/dist/ s3://pixdrift-bc-workstation-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html" 2>&1
            aws s3 cp apps/workstation/dist/index.html s3://pixdrift-bc-workstation-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache" 2>&1
          else
            echo "No workstation dist"
          fi

      - name: Deploy admin
        run: |
          if [ -d "apps/admin/dist" ]; then
            aws s3 sync apps/admin/dist/ s3://pixdrift-bc-admin-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html" 2>&1
            aws s3 cp apps/admin/dist/index.html s3://pixdrift-bc-admin-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache" 2>&1
          else
            echo "No admin dist"
          fi

      - name: Deploy CRM
        run: |
          if [ -d "apps/crm/dist" ]; then
            aws s3 sync apps/crm/dist/ s3://pixdrift-bc-crm-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html" 2>&1
            aws s3 cp apps/crm/dist/index.html s3://pixdrift-bc-crm-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache" 2>&1
          else
            echo "No crm dist"
          fi

      - name: Deploy sales
        run: |
          if [ -d "apps/sales/dist" ]; then
            aws s3 sync apps/sales/dist/ s3://pixdrift-bc-sales-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html" 2>&1
            aws s3 cp apps/sales/dist/index.html s3://pixdrift-bc-sales-prod/index.html \
              --region ${{ env.AWS_REGION }} --cache-control "no-cache" 2>&1
          else
            echo "No sales dist"
          fi

      - name: Summary
        if: always()
        run: |
          echo "=== Frontend Deploy Summary ==="
          for BUCKET in pixdrift-landing-prod pixdrift-bc-workstation-prod pixdrift-bc-admin-prod pixdrift-bc-crm-prod pixdrift-bc-sales-prod; do
            COUNT=$(aws s3 ls "s3://$BUCKET/" --recursive 2>/dev/null | wc -l || echo 0)
            echo "$BUCKET: $COUNT files"
          done
