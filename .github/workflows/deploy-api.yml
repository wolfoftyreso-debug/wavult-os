name: Deploy API to ECS

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-api.yml"

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: hypbit/api
  ECS_CLUSTER: hypbit
  ECS_SERVICE: hypbit-api
  CONTAINER_NAME: api

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build & push Docker image
        working-directory: server
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.IMAGE }}" \
            --tag "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" \
            --cache-from "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
          docker push "${{ steps.meta.outputs.IMAGE }}"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
        env:
          DOCKER_BUILDKIT: "1"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition hypbit-api \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.meta.outputs.IMAGE }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Verify health check
        run: |
          sleep 10
          curl -f https://api.hypbit.com/health || echo "Health check failed — check ECS logs"
