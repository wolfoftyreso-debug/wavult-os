name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-api.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 155407238699.dkr.ecr.eu-north-1.amazonaws.com
  ECS_CLUSTER: hypbit
  ECS_SERVICE: hypbit-api

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build, tag, and push Docker image
        id: build
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/hypbit/api:${{ steps.meta.outputs.tag }}"
          LATEST="${{ env.ECR_REGISTRY }}/hypbit/api:latest"

          docker build -f Dockerfile -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Update ECS service
        run: |
          # Get current task definition and update image
          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].taskDefinition' \
            --output text)

          # Get the task def JSON and swap the image to the new SHA-tagged one
          NEW_IMAGE="${{ env.ECR_REGISTRY }}/hypbit/api:${{ steps.meta.outputs.tag }}"

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json | \
            python3 -c "
import sys, json
td = json.load(sys.stdin)
for c in td.get('containerDefinitions', []):
    c['image'] = '$NEW_IMAGE'
# Remove fields that can't be included in register
for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
    td.pop(k, None)
print(json.dumps(td))
")

          # Register new task definition revision
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: $NEW_TASK_DEF_ARN"

          # Update service to use new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment (with timeout)
        run: |
          echo "Waiting for ECS deployment to stabilize (max 8 min)..."
          
          # Poll every 15s for up to 8 minutes instead of using wait (which has no timeout)
          MAX_ATTEMPTS=32
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            
            # Get deployment status
            RESULT=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].{running:runningCount,desired:desiredCount,pending:pendingCount,deployments:length(deployments)}' \
              --output json)
            
            RUNNING=$(echo "$RESULT" | jq -r '.running')
            DESIRED=$(echo "$RESULT" | jq -r '.desired')
            PENDING=$(echo "$RESULT" | jq -r '.pending')
            DEPLOYS=$(echo "$RESULT" | jq -r '.deployments')
            
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: running=$RUNNING desired=$DESIRED pending=$PENDING deployments=$DEPLOYS"
            
            # Success: running == desired AND only 1 deployment AND no pending
            if [ "$RUNNING" = "$DESIRED" ] && [ "$DEPLOYS" = "1" ] && [ "$PENDING" = "0" ]; then
              echo "✅ Deployment stable!"
              break
            fi
            
            # Last attempt — don't fail, just warn
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "⚠️ Deployment still stabilizing after 8 min — continuing anyway (health check will validate)"
              break
            fi
            
            sleep 15
          done

      - name: Health check
        run: |
          sleep 20
          echo "Running health check..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.bc.pixdrift.com/health || echo "000")
            echo "Attempt $i: API health = $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ API healthy"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ API health check inconclusive (may still be starting)"
          # Don't fail the pipeline for health check — ECS will restart if unhealthy
          exit 0

      - name: Ensure minimum 2 tasks running
        run: |
          # Always ensure we have 2 tasks for redundancy
          CURRENT=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].desiredCount' \
            --output text)
          
          if [ "$CURRENT" -lt "2" ]; then
            echo "⚠️ Only $CURRENT task(s) configured — scaling to 2 for redundancy"
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service ${{ env.ECS_SERVICE }} \
              --desired-count 2 \
              --region ${{ env.AWS_REGION }}
            echo "✅ Scaled to 2 tasks"
          else
            echo "✅ $CURRENT tasks running — redundancy OK"
          fi

      - name: Deploy summary
        run: |
          echo "=== Deploy Summary ==="
          echo "Image: ${{ steps.build.outputs.image }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].{running:runningCount,desired:desiredCount,status:status}' \
            --output table
