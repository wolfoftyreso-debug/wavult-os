        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'
    post:
      summary: Create API key
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                  default: [read]
                expires_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: API key created (key shown only once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiKey'
                  - type: object
                    properties:
                      key:
                        type: string
                        description: Full API key — store securely, shown only once

  /api/admin/api-keys/{id}:
    delete:
      summary: Revoke API key
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Key revoked
        '404':
          $ref: '#/components/responses/NotFound'

# ─── COMPONENTS ──────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string
          example: Resource not found

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 1.3.0
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: string
              example: ok
            supabase:
              type: string
              example: ok
        uptime:
          type: number
          description: Uptime in seconds

    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company_id:
          type: string
          format: uuid
        title:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ContactInput:
      type: object
      required: [first_name, last_name]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company_id:
          type: string
          format: uuid
        title:
          type: string

    Company:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
        org_number:
          type: string
        industry:
          type: string
        website:
          type: string
        country:
          type: string
        created_at:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        org_number:
          type: string
        industry:
          type: string
        website:
          type: string
        country:
          type: string

    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        title:
          type: string
        contact_id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        source:
          type: string
        status:
          type: string
          enum: [new, contacted, qualified, converted, lost]
        created_at:
          type: string
          format: date-time

    LeadInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        contact_id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        source:
          type: string
        status:
          type: string
          default: new

    Deal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        title:
          type: string
        value:
          type: number
        currency:
          type: string
          example: SEK
        status:
          type: string
          enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]
        contact_id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        expected_close_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    DealInput:
      type: object
      required: [title, value]
      properties:
        title:
          type: string
        value:
          type: number
        currency:
          type: string
          default: SEK
        status:
          type: string
          default: prospecting
        contact_id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        expected_close_date:
          type: string
          format: date

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        assigned_to:
          type: string
          format: uuid
        due_date:
          type: string
          format: date-time
        priority:
          type: string
          enum: [low, medium, high, urgent]
        created_at:
          type: string
          format: date-time

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        assigned_to:
          type: string
          format: uuid
        due_date:
          type: string
          format: date-time
        priority:
          type: string
          default: medium

    Meeting:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        title:
          type: string
        scheduled_at:
          type: string
          format: date-time
        duration_minutes:
          type: integer
        location:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    MeetingInput:
      type: object
      required: [title, scheduled_at]
      properties:
        title:
          type: string
        scheduled_at:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          default: 60
        location:
          type: string
        notes:
          type: string
        attendees:
          type: array
          items:
            type: string
            format: uuid
          description: User IDs to invite

    LedgerEntryInput:
      type: object
      required: [lines, description]
      properties:
        description:
          type: string
        reference:
          type: string
        lines:
          type: array
          minItems: 2
          items:
            type: object
            required: [account_id]
            properties:
              account_id:
                type: string
              debit:
                type: number
                default: 0
              credit:
                type: number
                default: 0

    LedgerEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        description:
          type: string
        reference:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    TrialBalance:
      type: object
      properties:
        accounts:
          type: array
          items:
            type: object
            properties:
              account_id:
                type: string
              total_debit:
                type: number
              total_credit:
                type: number
              balance:
                type: number
        total_debits:
          type: number
        total_credits:
          type: number
        balanced:
          type: boolean

    Payout:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        amount:
          type: number
        currency:
          type: string
        recipient_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, paid, cancelled]
        created_at:
          type: string
          format: date-time

    PayoutInput:
      type: object
      required: [amount, currency, recipient_id]
      properties:
        amount:
          type: number
        currency:
          type: string
        recipient_id:
          type: string
          format: uuid
        notes:
          type: string

    Decision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        decided_by:
          type: string
          format: uuid
        decided_at:
          type: string
          format: date-time

    DecisionInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string

    Channel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        created_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        content:
          type: string
        created_at:
          type: string
          format: date-time

    MessageInput:
      type: object
      required: [channel_id, content]
      properties:
        channel_id:
          type: string
          format: uuid
        content:
          type: string

    AdminDashboard:
      type: object
      properties:
        total_users:
          type: integer
        total_deals:
          type: integer
        total_revenue:
          type: number
        active_processes:
          type: integer
        open_nc:
          type: integer

    SalesDashboard:
      type: object
      properties:
        pipeline_value:
          type: number
        deals_by_stage:
          type: object
        conversion_rate:
          type: number
        top_deals:
          type: array
          items:
            $ref: '#/components/schemas/Deal'

    FinanceDashboard:
      type: object
      properties:
        revenue_mtd:
          type: number
        expenses_mtd:
          type: number
        cashflow:
          type: number
        outstanding_payouts:
          type: number

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        action:
          type: string
        entity:
          type: string
        entity_id:
          type: string
          format: uuid
        meta:
          type: object
        created_at:
          type: string
          format: date-time

    CapabilityProfile:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        assessments:
          type: array
          items:
            $ref: '#/components/schemas/Assessment'
        summary:
          type: object
          properties:
            total_capabilities:
              type: integer
            average_level:
              type: string
            gaps:
              type: array
              items:
                type: object

    TeamHeatmap:
      type: object
      properties:
        heatmap:
          type: array
          items:
            type: object
            properties:
              capability_id:
                type: string
              user_count:
                type: integer
              average_level:
                type: number
              gap_count:
                type: integer

    Assessment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        capability_id:
          type: string
          format: uuid
        level:
          type: string
          enum: [L1, L2, L3, L4, L5]
        level_label:
          type: string
          enum: [Novice, Advanced Beginner, Competent, Proficient, Expert]
        target_level:
          type: string
          enum: [L1, L2, L3, L4, L5]
        gap:
          type: integer
        assessed_by:
          type: string
          format: uuid
        assessed_at:
          type: string
          format: date-time
        notes:
          type: string

    AssessmentInput:
      type: object
      required: [capability_id, level, assessed_by]
      properties:
        capability_id:
          type: string
          format: uuid
        level:
          type: string
          enum: [L1, L2, L3, L4, L5]
        target_level:
          type: string
          enum: [L1, L2, L3, L4, L5]
        assessed_by:
          type: string
          format: uuid
        notes:
          type: string

    Feedback:
      type: object
      properties:
        id:
          type: string
          format: uuid
        from_user_id:
