openapi: 3.0.3
info:
  title: pixdrift API
  description: |
    pixdrift SaaS OMS (Order Management System) platform API.
    
    All endpoints require Bearer token authentication via Supabase JWT or API key.
    Rate limits: 100 requests/15min (Standard), 1000 requests/15min (Enterprise).
  version: 1.3.0
  contact:
    name: pixdrift Developer Support
    url: https://api.bc.pixdrift.com/developers
  license:
    name: Proprietary
    url: https://pixdrift.com/terms

servers:
  - url: https://api.bc.pixdrift.com
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Health
    description: System health and status
  - name: Execution
    description: CRM — Contacts, Companies, Leads, Deals, Tasks, Meetings, Ledger, Payouts, Decisions, Channels, Dashboards
  - name: Capability
    description: Capability assessments, feedback, development plans, goals
  - name: Process
    description: Process management, NC, improvements, compliance, documents, audits, risks, training
  - name: Currency
    description: Multi-currency support, exchange rates, FX exposure
  - name: Reports
    description: Financial reports — SIE4, income statement, balance sheet, VAT, cashflow
  - name: Stripe
    description: Subscription plans, checkout sessions, webhooks

paths:

  # ─── HEALTH ────────────────────────────────────────────────────────────────

  /health:
    get:
      summary: System health check
      tags: [Health]
      security: []
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/execution/health:
    get:
      summary: Execution module health check
      tags: [Health]
      security: []
      responses:
        '200':
          description: Execution module is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  module:
                    type: string
                    example: execution

  # ─── CONTACTS ──────────────────────────────────────────────────────────────

  /api/contacts:
    get:
      summary: List contacts
      tags: [Execution]
      responses:
        '200':
          description: List of contacts for the authenticated organization
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create contact
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInput'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── COMPANIES ─────────────────────────────────────────────────────────────

  /api/companies:
    get:
      summary: List companies
      tags: [Execution]
      responses:
        '200':
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Company'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create company
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
      responses:
        '201':
          description: Company created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── LEADS ─────────────────────────────────────────────────────────────────

  /api/leads:
    get:
      summary: List leads
      tags: [Execution]
      responses:
        '200':
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lead'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create lead
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadInput'
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── DEALS ─────────────────────────────────────────────────────────────────

  /api/deals:
    get:
      summary: List deals
      tags: [Execution]
      responses:
        '200':
          description: List of deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deal'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create deal
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealInput'
      responses:
        '201':
          description: Deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/deals/{id}/status:
    patch:
      summary: Update deal status
      tags: [Execution]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]
      responses:
        '200':
          description: Deal status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── TASKS ─────────────────────────────────────────────────────────────────

  /api/tasks:
    get:
      summary: List all tasks
      tags: [Execution]
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create task
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/my:
    get:
      summary: List tasks assigned to current user
      tags: [Execution]
      responses:
        '200':
          description: Tasks assigned to authenticated user, ordered by due date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

  /api/tasks/{id}/status:
    patch:
      summary: Update task status
      tags: [Execution]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  example: completed
      responses:
        '200':
          description: Task status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── MEETINGS ──────────────────────────────────────────────────────────────

  /api/meetings:
    post:
      summary: Create meeting
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingInput'
      responses:
        '201':
          description: Meeting created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ─── LEDGER ────────────────────────────────────────────────────────────────

  /api/ledger/entries:
    post:
      summary: Create double-entry ledger transaction
      tags: [Execution]
      description: Creates a balanced journal entry. Debits must equal credits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerEntryInput'
      responses:
        '201':
          description: Ledger entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/ledger/trial-balance:
    get:
      summary: Get trial balance
      tags: [Execution]
      responses:
        '200':
          description: Trial balance aggregated by account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrialBalance'

  # ─── PAYOUTS ───────────────────────────────────────────────────────────────

  /api/payouts:
    get:
      summary: List payouts
      tags: [Execution]
      responses:
        '200':
          description: List of payouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payout'
    post:
      summary: Create payout request
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayoutInput'
      responses:
        '201':
          description: Payout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payout'

  /api/payouts/{id}/approve:
    patch:
      summary: Approve payout
      tags: [Execution]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Payout approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payout'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── CONFIG ────────────────────────────────────────────────────────────────

  /api/config:
    get:
      summary: Get organization config
      tags: [Execution]
      responses:
        '200':
          description: Organization configuration
          content:
            application/json:
              schema:
                type: object
    patch:
      summary: Update organization config
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Config updated

  # ─── DECISIONS ─────────────────────────────────────────────────────────────

  /api/decisions:
    get:
      summary: List decisions
      tags: [Execution]
      responses:
        '200':
          description: List of decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Decision'
    post:
      summary: Create decision
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionInput'
      responses:
        '201':
          description: Decision created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Decision'

  # ─── CHANNELS & MESSAGES ───────────────────────────────────────────────────

  /api/channels:
    get:
      summary: List channels
      tags: [Execution]
      responses:
        '200':
          description: List of communication channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Channel'

  /api/channels/{id}/messages:
    get:
      summary: Get messages in channel
      tags: [Execution]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Messages in channel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'

  /api/messages:
    post:
      summary: Send message to channel
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageInput'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  # ─── DASHBOARDS ────────────────────────────────────────────────────────────

  /api/dashboards/admin:
    get:
      summary: Admin dashboard metrics
      tags: [Execution]
      responses:
        '200':
          description: Admin KPIs and metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboard'

  /api/dashboards/sales:
    get:
      summary: Sales dashboard metrics
      tags: [Execution]
      responses:
        '200':
          description: Sales pipeline and KPIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesDashboard'

  /api/dashboards/finance:
    get:
      summary: Finance dashboard metrics
      tags: [Execution]
      responses:
        '200':
          description: Financial KPIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceDashboard'

  /api/dashboards/management:
    get:
      summary: Management dashboard metrics
      tags: [Process]
      responses:
        '200':
          description: Management overview
          content:
            application/json:
              schema:
                type: object

  # ─── AUDIT ─────────────────────────────────────────────────────────────────

  /api/audit:
    get:
      summary: List audit log entries
      tags: [Execution]
      parameters:
        - name: entity
          in: query
          schema:
            type: string
          description: Filter by entity type
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'

  # ─── CAPABILITY ─────────────────────────────────────────────────────────────

  /api/capabilities/profile/{userId}:
    get:
      summary: Get user capability profile
      tags: [Capability]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Capability profile with assessments and gaps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityProfile'

  /api/capabilities/team:
    get:
      summary: Get team capability heatmap
      tags: [Capability]
      responses:
        '200':
          description: Team capability overview with heatmap data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamHeatmap'

  /api/capabilities/assess/{userId}:
    post:
      summary: Create capability assessment for user
      tags: [Capability]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentInput'
      responses:
        '201':
          description: Assessment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assessment'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/feedback:
    post:
      summary: Submit feedback for a user
      tags: [Capability]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackInput'
      responses:
        '201':
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feedback'

  /api/development/plan/{userId}:
    get:
      summary: Get user development plan
      tags: [Capability]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Development plan with actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevelopmentPlan'

  /api/development/generate/{userId}:
    post:
      summary: Auto-generate development plan from capability gaps
      tags: [Capability]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Development plan generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevelopmentPlan'

  /api/goals:
    get:
      summary: List organizational goals
      tags: [Capability]
      responses:
        '200':
          description: List of organizational goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Goal'
    post:
      summary: Create organizational goal
      tags: [Capability]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalInput'
      responses:
        '201':
          description: Goal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'

  /api/goals/{id}/readiness:
    get:
      summary: Check team readiness for a goal
      tags: [Capability]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Readiness assessment for the goal
          content:
            application/json:
              schema:
                type: object
                properties:
                  goal_id:
                    type: string
                    format: uuid
                  readiness_score:
                    type: number
                  gaps:
                    type: array
                    items:
                      type: object

  /api/dashboards/capabilities:
    get:
      summary: Capabilities dashboard
      tags: [Capability]
      responses:
        '200':
          description: Capability KPIs and team overview
          content:
            application/json:
              schema:
                type: object

  # ─── PROCESS ────────────────────────────────────────────────────────────────

  /api/processes:
    get:
      summary: List processes
      tags: [Process]
      responses:
        '200':
          description: List of processes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Process'
    post:
      summary: Create process
      tags: [Process]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessInput'
      responses:
        '201':
          description: Process created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'

  /api/processes/{id}/execute:
    post:
      summary: Start process execution
      tags: [Process]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                context:
                  type: object
      responses:
        '201':
          description: Process execution started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessExecution'

  /api/processes/performance:
    get:
      summary: Get process performance metrics
      tags: [Process]
      responses:
        '200':
          description: Process performance data
          content:
            application/json:
              schema:
                type: object

  /api/process-executions/{id}/step:
    patch:
      summary: Advance process execution to next step
      tags: [Process]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step_id, status]
              properties:
                step_id:
                  type: string
                status:
                  type: string
                  enum: [completed, skipped, failed]
                notes:
                  type: string
      responses:
        '200':
          description: Step updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessExecution'

  # ─── NON-CONFORMANCE ────────────────────────────────────────────────────────

  /api/nc:
    get:
      summary: List non-conformances
      tags: [Process]
      responses:
        '200':
          description: List of non-conformances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NonConformance'
    post:
      summary: Create non-conformance report
      tags: [Process]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NonConformanceInput'
      responses:
        '201':
          description: Non-conformance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NonConformance'

  /api/nc/{id}/status:
    patch:
      summary: Update non-conformance status
      tags: [Process]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, investigating, resolved, closed]
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NonConformance'

  /api/nc/summary:
    get:
      summary: Non-conformance summary statistics
      tags: [Process]
      responses:
        '200':
          description: NC summary by status, type, and trend
          content:
            application/json:
              schema:
                type: object

  # ─── IMPROVEMENTS ───────────────────────────────────────────────────────────

  /api/improvements:
    get:
      summary: List improvement actions
      tags: [Process]
      responses:
        '200':
          description: List of improvements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Improvement'
    post:
      summary: Create improvement action
      tags: [Process]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImprovementInput'
      responses:
        '201':
          description: Improvement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Improvement'

  /api/improvements/{id}:
    patch:
      summary: Update improvement action
      tags: [Process]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImprovementInput'
      responses:
        '200':
          description: Improvement updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Improvement'

  # ─── COMPLIANCE ─────────────────────────────────────────────────────────────

  /api/compliance:
    get:
      summary: List compliance frameworks
      tags: [Process]
      responses:
        '200':
          description: Compliance frameworks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceFramework'

  /api/compliance/{id}/requirements:
    get:
      summary: Get requirements for a compliance framework
      tags: [Process]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Requirements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceRequirement'

  /api/compliance/requirements/{id}:
    patch:
      summary: Update compliance requirement status
      tags: [Process]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [compliant, non_compliant, partial, not_applicable]
                evidence:
                  type: string
      responses:
        '200':
          description: Requirement updated

  # ─── DOCUMENTS ──────────────────────────────────────────────────────────────

  /api/documents:
    get:
      summary: List documents
      tags: [Process]
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
    post:
      summary: Create document
      tags: [Process]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentInput'
      responses:
        '201':
          description: Document created
          content:
            application/json:
