# =============================================
# Hypbit OMS — Docker Compose (lokal testning)
# Kör: docker compose up --build
# =============================================

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hypbit-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      # Ladda från .env-fil lokalt
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # För lokal utveckling: montera src/ för hot-reload
      # Kommentera ut i produktion
      - ./src:/app/src:ro
      - ./trigger:/app/trigger:ro

# Nätverk (isolerat)
networks:
  default:
    name: hypbit-network
