name: RTM Gate

on:
  pull_request:
    branches: [rtm, main]
    types: [opened, synchronize, reopened]

jobs:
  rtm-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Verify RTM requirements
        run: |
          echo "=== RTM Gate Check ==="
          echo "PR to: ${{ github.base_ref }}"
          echo "From: ${{ github.head_ref }}"
          echo ""
          echo "REQUIRED APPROVALS:"
          echo "  ✋ Dennis Bjarnemark — Legal/Compliance"
          echo "  ✋ Winston Bjarnemark — Finance"
          echo "  ✋ Johan Berglund — Technical"
          echo "  ✋ Erik Svensson — Chairman"
          echo ""
          echo "RTM-processen kräver att ALLA 4 godkännanden är på plats"
          echo "innan merge tillåts. Se PR-mallen för fullständig checklista."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check RTM template compliance
        run: |
          if [ "${{ github.base_ref }}" = "rtm" ] || [ "${{ github.base_ref }}" = "main" ]; then
            echo "RTM branch detected — stricter requirements apply"
            # Kolla att PR-beskrivningen innehåller checklistan
            echo "Branch protection requires 4 approvals for merge"
          fi

  build-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build verification
        run: npm run build

      - name: TypeScript check
        run: npx tsc --noEmit 2>&1 || true
